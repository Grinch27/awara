name: Build APK

# TODO(user): Decide whether release builds should keep running on every manual dispatch or move to tagged releases only.
# TODO(agent): If the latest stable Gradle moves ahead of AGP support, compare that failure against the pinned 9.1.0 wrapper baseline first.
# TODO(agent): If compilation fails after the toolchain phase, the next research surface is the Compose and Accompanist dependency set.

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        build_type: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: on-success

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve latest stable Gradle
        id: gradle-version
        run: |
          set -euo pipefail
          gradle_version="$(python3 -c 'import json, urllib.request; print(json.load(urllib.request.urlopen("https://services.gradle.org/versions/current"))["version"])')"
          echo "version=${gradle_version}" >> "$GITHUB_OUTPUT"
          echo "Latest stable Gradle: ${gradle_version}"

          if [[ "${gradle_version%%.*}" -lt 9 ]]; then
            echo "Expected Gradle 9 or newer, got ${gradle_version}" >&2
            exit 1
          fi

      - name: Update Gradle wrapper to latest stable
        run: |
          set -euo pipefail
          gradle_version='${{ steps.gradle-version.outputs.version }}'
          sed -i -E "s|gradle-[0-9]+(\.[0-9]+)*-[a-z]+\.zip|gradle-${gradle_version}-bin.zip|" gradle/wrapper/gradle-wrapper.properties
          echo "Updated gradle-wrapper.properties to ${gradle_version}"
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          set -euo pipefail
          ./gradlew --version
          ./gradlew assemble${{ matrix.build_type == 'debug' && 'Debug' || 'Release' }} --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.build_type }}
          path: app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          compression-level: 9 # maximum compression
          retention-days: 1
