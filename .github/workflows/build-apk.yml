name: Build APK

# TODO(user): Decide whether release builds should keep running on every manual dispatch or move to tagged releases only.
# TODO(agent): If the latest stable Gradle moves ahead of AGP support, disable wrapper auto-sync before changing app code.
# TODO(agent): If compilation fails after the toolchain phase, the next research surface is the Compose and Accompanist dependency set.

permissions:
  contents: read

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        build_type: [debug, release]

    steps:
      - name: Checkout code
        uses: actions/checkout@main

      - name: Setup JDK
        uses: actions/setup-java@main
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@main
        with:
          cache-cleanup: on-success

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@main

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Sync Gradle wrapper to latest stable
        run: |
          set -euo pipefail
          bash ./scripts/sync-gradle-wrapper.sh

      - name: Build APK
        run: |
          set -euo pipefail
          ./gradlew --version
          ./gradlew assemble${{ matrix.build_type == 'debug' && 'Debug' || 'Release' }} --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@main
        with:
          name: app-${{ matrix.build_type }}
          path: app/build/outputs/apk/${{ matrix.build_type }}/*.apk
          compression-level: 9 # maximum compression
          retention-days: 1
